name: Build Decky LSFG-VK v2 test release

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  RELEASE_TAG: v0.13.0-v2test.2
  RELEASE_ZIP: Decky.LSFG-VK-v2-dev28-profile-fix.zip

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out plugin
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
          run_install: false

      - name: Build frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Test v2 integration
        run: python -m unittest discover -s tests -v

      - name: Download and verify bundled binaries
        run: |
          mkdir -p "package/Decky LSFG-VK/bin"
          jq -r '.remote_binary[] | [.name, .url, .sha256hash] | @tsv' package.json |
            while IFS=$'\t' read -r name url sha256; do
              destination="package/Decky LSFG-VK/bin/$name"
              curl --fail --location --retry 3 --output "$destination" "$url"
              echo "$sha256  $destination" | sha256sum --check -
            done

      - name: Validate generated config with LSFG-VK v2
        run: |
          mkdir -p /tmp/lsfg-v2
          tar -xf "package/Decky LSFG-VK/bin/lsfg-vk-2.0.0-dev28-linux.tar.xz" -C /tmp/lsfg-v2
          python -c 'from pathlib import Path; from py_modules.lsfg_vk.config_schema import ConfigurationManager; Path("/tmp/lsfg-v2-test.toml").write_text(ConfigurationManager.generate_toml_content(ConfigurationManager.get_defaults()), encoding="utf-8")'
          /tmp/lsfg-v2/bin/lsfg-vk-cli validate --config /tmp/lsfg-v2-test.toml

      - name: Assemble Decky plugin
        run: |
          plugin_root="package/Decky LSFG-VK"
          cp LICENSE main.py package.json plugin.json README.md shared_config.py "$plugin_root/"
          cp -r dist "$plugin_root/"
          mkdir -p "$plugin_root/py_modules/lsfg_vk"
          cp py_modules/lsfg_vk/*.py "$plugin_root/py_modules/lsfg_vk/"
          cd package
          zip -r "../$RELEASE_ZIP" "Decky LSFG-VK"
          cd ..
          sha256sum "$RELEASE_ZIP" > "$RELEASE_ZIP.sha256"

      - name: Preserve release artifact
        uses: actions/upload-artifact@v4
        with:
          name: decky-lsfg-v2-test-release
          path: |
            ${{ env.RELEASE_ZIP }}
            ${{ env.RELEASE_ZIP }}.sha256

      - name: Publish prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$RELEASE_TAG" \
            "$RELEASE_ZIP" \
            "$RELEASE_ZIP.sha256" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --prerelease \
            --title "Decky LSFG-VK v2 dev28 profile activation fix" \
            --notes "Experimental Decky test build using LSFG-VK v2.0.0-dev28. Fixes Flatpak activation by explicitly passing the selected LSFGVK_PROFILE into Azahar, Dolphin, and other configured Flatpak sandboxes. Reapply the app override once after upgrading. Includes verified native and Flatpak v2 bundles for runtimes 23.08, 24.08, and 25.08. This does not implement virtual-swapchain support, so emulator frame-pacing issues may remain."
